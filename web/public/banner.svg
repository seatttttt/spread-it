<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ca8a04" stop-opacity="1" />
      <stop offset="55%" stop-color="#ca8a04" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#ca8a04" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d4d4d0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="#fafaf7"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Left: Logo -->
  <g transform="translate(170, 130)">
    <circle cx="120" cy="120" r="115" fill="none" stroke="#ca8a04" stroke-width="2.5" opacity="0.35" />
    <circle cx="120" cy="55" r="40" fill="none" stroke="#ca8a04" stroke-width="8" />
    <circle cx="61" cy="159" r="40" fill="none" stroke="#ca8a04" stroke-width="8" />
    <circle cx="179" cy="159" r="40" fill="none" stroke="#ca8a04" stroke-width="8" />
    <line x1="120" y1="120" x2="120" y2="55" stroke="#ca8a04" stroke-width="3" opacity="0.55" />
    <line x1="120" y1="120" x2="61" y2="159" stroke="#ca8a04" stroke-width="3" opacity="0.55" />
    <line x1="120" y1="120" x2="179" y2="159" stroke="#ca8a04" stroke-width="3" opacity="0.55" />
    <circle cx="120" cy="120" r="26" fill="url(#pulse)" />
    <circle cx="120" cy="120" r="10" fill="#ca8a04" />
  </g>

  <!-- Right: Wordmark + tagline -->
  <g transform="translate(490, 0)">
    <text x="0" y="220" font-family="'Söhne', Inter, sans-serif" font-size="92" font-weight="700" fill="#1a1a1a" letter-spacing="2">
      SPREAD IT
    </text>
    <text x="0" y="265" font-family="'JetBrains Mono', monospace" font-size="20" fill="#6b6b66" letter-spacing="4">
      $SPREAD · STRAIN TRACKER · LIVE R-SCORE REPORTING
    </text>
    <line x1="0" y1="290" x2="900" y2="290" stroke="#d4d4d0" stroke-width="1"/>
    <text x="0" y="335" font-family="'JetBrains Mono', monospace" font-size="18" fill="#1a1a1a">
      <tspan fill="#ca8a04">▸</tspan> Hold ≥ 0.1% to qualify as carrier
    </text>
    <text x="0" y="365" font-family="'JetBrains Mono', monospace" font-size="18" fill="#1a1a1a">
      <tspan fill="#ca8a04">▸</tspan> Spread to clean wallets to earn R-points
    </text>
    <text x="0" y="395" font-family="'JetBrains Mono', monospace" font-size="18" fill="#1a1a1a">
      <tspan fill="#dc2626">▸</tspan> Drain &gt; 40% of peak → quarantine
    </text>
  </g>
</svg>
